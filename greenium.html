    <script>

            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        },
        scales: {
            x: {
                title: {
                    display: true,
                    text: 'Maturity (Years)'
                }
            },
            y: {
                title: {
                    display: true,
                    text: 'Basis Points'
                }
            }

    }
